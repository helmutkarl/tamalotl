<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#bfefff" />
    <title>Tamalotl</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="app-card">
        <header class="hero">
          <p class="eyebrow">Tiny axolotl care game</p>
          <h1>Tamalotl</h1>
          <p class="subtitle">
            A tiny underwater friend who just wants snacks, naps, and a clean
            little pond.
          </p>
        </header>

        <section class="pet-panel" aria-labelledby="pet-heading">
          <div class="panel-top">
            <h2 id="pet-heading">Tamalotl</h2>
            <p class="status-pill" data-status-label>Feeling bubbly</p>
          </div>

          <p class="speech-bubble" data-message aria-live="polite">
            Blub blub... what a gentle day.
          </p>

          <div class="tank" aria-hidden="true">
            <span class="tank-bubble tank-bubble--1"></span>
            <span class="tank-bubble tank-bubble--2"></span>
            <span class="tank-bubble tank-bubble--3"></span>
            <span class="tank-bubble tank-bubble--4"></span>
            <span class="seaweed seaweed--left"></span>
            <span class="seaweed seaweed--right"></span>

            <div class="pet-stage">
              <div class="axolotl-shadow"></div>
              <div class="axolotl" data-pet data-state="happy" aria-label="A cute axolotl">
                <span class="axolotl__tail"></span>
                <span class="axolotl__body"></span>
                <span class="axolotl__head"></span>
                <span class="axolotl__leg axolotl__leg--front"></span>
                <span class="axolotl__leg axolotl__leg--back"></span>

                <span class="axolotl__gills axolotl__gills--left">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <span class="axolotl__gills axolotl__gills--right">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>

                <span class="axolotl__eye axolotl__eye--left"></span>
                <span class="axolotl__eye axolotl__eye--right"></span>
                <span class="axolotl__blush axolotl__blush--left"></span>
                <span class="axolotl__blush axolotl__blush--right"></span>
                <span class="axolotl__mouth"></span>
              </div>
            </div>
          </div>
        </section>

        <section class="stats-grid" aria-label="Status values">
          <article class="stat-card" data-stat-card="hunger">
            <div class="stat-card__top">
              <span class="stat-card__label">Hunger</span>
              <span class="stat-card__value" data-stat-value="hunger">78%</span>
            </div>
            <div
              class="meter"
              role="progressbar"
              aria-label="Hunger"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="78"
              data-meter="hunger"
            >
              <span class="meter__fill" data-meter-fill="hunger"></span>
            </div>
          </article>

          <article class="stat-card" data-stat-card="happiness">
            <div class="stat-card__top">
              <span class="stat-card__label">Happiness</span>
              <span class="stat-card__value" data-stat-value="happiness">82%</span>
            </div>
            <div
              class="meter"
              role="progressbar"
              aria-label="Happiness"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="82"
              data-meter="happiness"
            >
              <span class="meter__fill" data-meter-fill="happiness"></span>
            </div>
          </article>

          <article class="stat-card" data-stat-card="energy">
            <div class="stat-card__top">
              <span class="stat-card__label">Energy</span>
              <span class="stat-card__value" data-stat-value="energy">76%</span>
            </div>
            <div
              class="meter"
              role="progressbar"
              aria-label="Energy"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="76"
              data-meter="energy"
            >
              <span class="meter__fill" data-meter-fill="energy"></span>
            </div>
          </article>

          <article class="stat-card" data-stat-card="cleanliness">
            <div class="stat-card__top">
              <span class="stat-card__label">Cleanliness</span>
              <span class="stat-card__value" data-stat-value="cleanliness">88%</span>
            </div>
            <div
              class="meter"
              role="progressbar"
              aria-label="Cleanliness"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="88"
              data-meter="cleanliness"
            >
              <span class="meter__fill" data-meter-fill="cleanliness"></span>
            </div>
          </article>
        </section>

        <section class="actions-grid" aria-label="Care actions">
          <button class="action-button" data-action="feed" type="button">
            <span class="action-button__label">Feed</span>
            <span class="action-button__hint">snack time</span>
          </button>
          <button class="action-button" data-action="play" type="button">
            <span class="action-button__label">Play</span>
            <span class="action-button__hint">tiny splashes</span>
          </button>
          <button class="action-button" data-action="sleep" type="button">
            <span class="action-button__label">Sleep</span>
            <span class="action-button__hint">cozy nap</span>
          </button>
          <button class="action-button" data-action="clean" type="button">
            <span class="action-button__label">Clean</span>
            <span class="action-button__hint">fresh water</span>
          </button>
        </section>

        <footer class="app-footer">
          <p>Saved only in this browser on this device.</p>
        </footer>
      </section>
    </main>

    <noscript>
      <p class="noscript">Tamalotl needs JavaScript to wiggle around.</p>
    </noscript>

    <script src="./js/constants.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/game.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
